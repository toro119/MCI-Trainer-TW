<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MCI Trainer TW 多人版</title>
<style>
:root{--navy:#16324f;--blue:#2d6a9f;--bg:#edf3f7;--card:#fff;--red:#d84a4a;--yellow:#e4b93d;--green:#3f9b63;--black:#333}
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei",sans-serif;background:var(--bg);color:#203040}
header{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;padding:18px}header h1{margin:0;font-size:22px}header p{margin:5px 0 0;opacity:.85}
main{max-width:1100px;margin:auto;padding:16px}.card{background:white;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 4px 18px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.c6{grid-column:span 6}.c4{grid-column:span 4}.c8{grid-column:span 8}.c12{grid-column:span 12}
input,select,button{width:100%;padding:12px;border-radius:10px;border:1px solid #cfd8df;font-size:16px;margin:5px 0}
button{background:var(--blue);color:white;border:0;font-weight:700;cursor:pointer}.secondary{background:#dfe8ef;color:#17324d}
.hidden{display:none}.patients{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
.patient{border:1px solid #d8e0e6;border-radius:12px;padding:12px;background:white}.patient button{font-size:14px;padding:8px}
.badge{display:inline-block;padding:4px 9px;border-radius:999px;color:white;font-weight:700;font-size:12px}.red{background:var(--red)}.yellow{background:var(--yellow);color:#4b3a00}.green{background:var(--green)}.black{background:var(--black)}.gray{background:#82909c}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:#f3f7fa;border-radius:10px;padding:12px;text-align:center}.stat b{display:block;font-size:24px}
.rolebar{display:flex;gap:8px;flex-wrap:wrap}.rolebar button{width:auto}
.notice{background:#fff6d6;padding:10px;border-radius:9px;margin:8px 0}
@media(max-width:760px){.c6,.c4,.c8,.c12{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header><h1>MCI Trainer TW</h1><p>手機多人同步演練 MVP</p></header>
<main>
<section id="lobby">
<div class="grid">
<div class="card c6">
<h3>教官建立演練</h3>
<input id="teacherName" value="教官" placeholder="姓名">
<input id="scenarioName" value="大量傷病患演練" placeholder="案件名稱">
<select id="scenarioType"><option>遊覽車翻覆</option><option>工廠爆炸</option><option>大型火災</option><option>地震災害</option></select>
<select id="patientCount"><option>8</option><option selected>12</option><option>20</option><option>30</option></select>
<button id="createBtn">建立房間</button>
</div>
<div class="card c6">
<h3>手機加入演練</h3>
<input id="joinName" placeholder="姓名">
<input id="roomCode" inputmode="numeric" placeholder="6 位數房間碼">
<select id="role">
<option value="commander">指揮官</option>
<option value="primary">一次檢傷官</option>
<option value="secondary">二次檢傷官</option>
<option value="transport">後送官</option>
<option value="dashboard">戰情中心</option>
</select>
<button id="joinBtn">加入房間</button>
</div>
</div>
</section>

<section id="app" class="hidden">
<div class="card">
<div class="rolebar"><button class="secondary" id="backBtn">返回首頁</button></div>
<h2 id="roomTitle"></h2>
<div id="memberInfo"></div>
</div>
<div id="roleView"></div>
</section>
</main>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
let state=null, myRole="", myName="";

const labels={red:"紅票",yellow:"黃票",green:"綠票",black:"黑票"};
const badge=c=>`<span class="badge ${c}">${labels[c]||"未檢傷"}</span>`;

function showApp(){
 document.getElementById("lobby").classList.add("hidden");
 document.getElementById("app").classList.remove("hidden");
}
function render(){
 if(!state)return;
 roomTitle.textContent=`房間 ${state.roomCode}｜${state.scenarioName}`;
 memberInfo.innerHTML=`角色：<b>${roleName(myRole)}</b>　姓名：<b>${myName}</b>　在線：${state.members.length} 人`;
 const done=state.patients.filter(p=>p.primaryResult).length;
 const second=state.patients.filter(p=>p.secondaryResult).length;
 const transported=state.patients.filter(p=>p.transported).length;
 const stats=`<div class="stats"><div class="stat"><b>${state.patients.length}</b>總傷患</div><div class="stat"><b>${done}</b>一次檢傷</div><div class="stat"><b>${second}</b>二次檢傷</div><div class="stat"><b>${transported}</b>已後送</div></div>`;
 if(myRole==="instructor")return renderInstructor(stats);
 if(myRole==="commander")return renderCommander(stats);
 if(myRole==="primary")return renderPrimary(stats);
 if(myRole==="secondary")return renderSecondary(stats);
 if(myRole==="transport")return renderTransport(stats);
 renderDashboard(stats);
}
function roleName(r){return {instructor:"教官",commander:"指揮官",primary:"一次檢傷官",secondary:"二次檢傷官",transport:"後送官",dashboard:"戰情中心"}[r]||r}
function renderInstructor(stats){
 roleView.innerHTML=`<div class="card">${stats}<button onclick="socket.emit('startExercise')">開始演練</button></div>
 <div class="card"><h3>房間碼</h3><div style="font-size:42px;font-weight:900">${state.roomCode}</div><p>學員用手機輸入此房間碼加入。</p></div>
 <div class="card"><h3>在線角色</h3>${state.members.map(m=>`<div>${m.name}｜${roleName(m.role)}</div>`).join("")}</div>`;
}
function renderCommander(stats){
 roleView.innerHTML=`<div class="card">${stats}</div><div class="card"><h3>請求救護車</h3><input id="ambCount" type="number" min="1" max="20" value="3"><button onclick="dispatchAmb()">隨機派遣並立即到場</button></div>
 <div class="card"><h3>現場救護車</h3>${state.resources.length?state.resources.map(r=>`<div>🚑 ${r.name}｜${r.status}</div>`).join(""):"尚無車輛"}</div>`;
}
function dispatchAmb(){socket.emit("dispatchAmbulances",{count:Number(ambCount.value||1)})}
function renderPrimary(stats){
 const list=state.patients.filter(p=>!p.primaryResult);
 roleView.innerHTML=`<div class="card">${stats}</div><div class="card"><h3>待一次檢傷</h3><div class="patients">${list.map(p=>patientCard(p,"primary")).join("")}</div></div>`;
}
function renderSecondary(stats){
 const list=state.patients.filter(p=>p.primaryResult&&!p.secondaryResult);
 roleView.innerHTML=`<div class="card">${stats}</div><div class="card"><h3>待二次檢傷</h3><div class="patients">${list.map(p=>patientCard(p,"secondary")).join("")}</div></div>`;
}
function patientCard(p,mode){
 return `<div class="patient"><b>${p.id}</b><br>${p.age}歲 ${p.sex}<br><small>${p.note}</small><br>${p.primaryResult?badge(p.primaryResult):""}
 <select id="${mode}_${p.id}"><option value="red">紅票</option><option value="yellow">黃票</option><option value="green">綠票</option><option value="black">黑票</option></select>
 <button onclick="submitTriage('${mode}','${p.id}')">送出</button></div>`;
}
function submitTriage(mode,id){
 const result=document.getElementById(`${mode}_${id}`).value;
 socket.emit(mode==="primary"?"submitPrimary":"submitSecondary",{patientId:id,result});
}
function renderTransport(stats){
 const waiting=state.patients.filter(p=>(p.secondaryResult||p.primaryResult)&&!p.transported&&(p.secondaryResult||p.primaryResult)!=="black");
 const ambulances=state.resources.filter(r=>r.type==="ambulance"&&(r.status==="到達現場"||r.status==="現場待命"));
 roleView.innerHTML=`<div class="card">${stats}</div>
 <div class="card"><h3>後送編組</h3><div class="notice">每車最多 3 人；紅黃不可同車；紅票或黃票每車最多 1 人。</div>
 <label>傷患（可複選 1～3 人）</label>
 <div class="patients">${waiting.map(p=>`<label class="patient"><input type="checkbox" class="txPatient" value="${p.id}"> ${p.id} ${badge(p.secondaryResult||p.primaryResult)}</label>`).join("")}</div>
 <label>救護車</label><select id="txAmb">${ambulances.map(a=>`<option>${a.name}</option>`).join("")}</select>
 <label>醫院</label><select id="txHospital"><option>林口長庚</option><option>部立桃園醫院</option><option>聯新國際醫院</option><option>桃園榮民總醫院</option></select>
 <button onclick="doTransport()">確認後送</button></div>
 <div class="card"><h3>後送紀錄</h3>${state.transportLogs.map(x=>`<div>${x.time}｜${x.patientIds.join("、")}｜${x.ambulance} → ${x.hospital}</div>`).join("")||"尚無紀錄"}</div>`;
}
function doTransport(){
 const patientIds=[...document.querySelectorAll(".txPatient:checked")].map(x=>x.value);
 const ambulance=txAmb.value, hospital=txHospital.value;
 socket.emit("transport",{patientIds,ambulance,hospital},res=>alert(res.ok?"後送完成":res.message));
}
function renderDashboard(stats){
 const counts={red:0,yellow:0,green:0,black:0};
 state.patients.forEach(p=>{const c=p.secondaryResult||p.primaryResult;if(c)counts[c]++});
 roleView.innerHTML=`<div class="card">${stats}</div><div class="card"><h3>即時票色</h3>
 <div class="stats"><div class="stat">${badge("red")}<b>${counts.red}</b></div><div class="stat">${badge("yellow")}<b>${counts.yellow}</b></div><div class="stat">${badge("green")}<b>${counts.green}</b></div><div class="stat">${badge("black")}<b>${counts.black}</b></div></div></div>`;
}

createBtn.onclick=()=>{
 myName=teacherName.value||"教官";myRole="instructor";
 socket.emit("createRoom",{name:myName,scenarioName:scenarioName.value,scenarioType:scenarioType.value,patientCount:patientCount.value},res=>{
  if(!res.ok)return alert("建立失敗");state=res.state;showApp();render();
 });
};
joinBtn.onclick=()=>{
 myName=joinName.value||"未具名";myRole=role.value;
 socket.emit("joinRoom",{roomCode:roomCode.value,name:myName,role:myRole},res=>{
  if(!res.ok)return alert(res.message);state=res.state;showApp();render();
 });
};
backBtn.onclick=()=>location.reload();
socket.on("state",s=>{state=s;render()});
</script>
</body>
</html>
