<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MCI Trainer TW</title><style>
:root{--navy:#17324d;--blue:#2f6f9f;--bg:#edf3f7;--line:#d8e1e8;--red:#d94b4b;--yellow:#e5b93f;--green:#3e9b63;--black:#333}*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei",sans-serif;background:var(--bg);color:#203040}header{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;padding:18px}header h1{margin:0;font-size:23px}header p{margin:4px 0 0;opacity:.85}main{max-width:1180px;margin:auto;padding:16px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.c4{grid-column:span 4}.c5{grid-column:span 5}.c6{grid-column:span 6}.c7{grid-column:span 7}.c8{grid-column:span 8}.c12{grid-column:span 12}.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 16px rgba(18,43,63,.08);margin-bottom:12px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;margin:5px 0}textarea{min-height:90px}button{border:0;border-radius:10px;padding:11px 14px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer}.secondary{background:#e4edf3;color:var(--navy)}.hidden{display:none}.patients{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}.patient{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;cursor:pointer}.selected{outline:3px solid #9fc7e3}.locked{opacity:.5}.badge{display:inline-block;padding:4px 9px;border-radius:999px;color:#fff;font-weight:800;font-size:12px}.red{background:var(--red)}.yellow{background:var(--yellow);color:#4c3a00}.green{background:var(--green)}.black{background:var(--black)}.gray{background:#87949e}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.stat{background:#f3f7fa;padding:12px;border-radius:10px;text-align:center}.stat b{display:block;font-size:24px}.notice{background:#fff6d8;padding:10px;border-radius:9px;margin:8px 0}.question{font-size:20px;font-weight:800;margin:16px 0}.choice{display:block;width:100%;text-align:left;margin:8px 0;background:#fff;color:#203040;border:1px solid var(--line)}.log{max-height:340px;overflow:auto}.log div{padding:7px 0;border-bottom:1px solid #edf0f2}.rolebar{display:flex;justify-content:space-between;gap:10px;align-items:center}.rolebar button{width:auto}@media(max-width:800px){.c4,.c5,.c6,.c7,.c8,.c12{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}}
</style></head><body><header><h1>MCI Trainer TW</h1><p>雲端多人完整介面版 v1.1</p></header><main>
<section id="lobby"><div class="grid"><div class="card c6"><h3>教官建立房間</h3><input id="teacherName" value="教官" placeholder="姓名"><input id="scenarioName" value="大量傷病患演練" placeholder="案件名稱"><select id="scenarioType"><option>遊覽車翻覆</option><option>工廠爆炸</option><option>大型火災</option><option>地震災害</option><option>化學災害</option></select><select id="patientCount"><option>8</option><option selected>12</option><option>20</option><option>30</option></select><button id="createBtn">建立房間</button></div><div class="card c6"><h3>加入演練</h3><input id="joinName" placeholder="姓名"><input id="roomCode" inputmode="numeric" placeholder="6位數房間碼"><select id="role"><option value="commander">指揮官</option><option value="primary">一次檢傷官</option><option value="secondary">二次檢傷官</option><option value="transport">後送官</option><option value="dashboard">戰情中心</option></select><button id="joinBtn">加入房間</button></div></div></section>
<section id="app" class="hidden"><div class="card rolebar"><div><h2 id="roomTitle" style="margin:0"></h2><div id="memberInfo"></div></div><button id="leaveBtn" class="secondary">離開</button></div><div id="roleView"></div></section>
</main><script src="/socket.io/socket.io.js"></script><script>
const socket=io();let state=null,myRole='',myName='',flow=null,transportChoice={patientIds:[],ambulance:null,hospital:null};const rn={instructor:'教官',commander:'指揮官',primary:'一次檢傷官',secondary:'二次檢傷官',transport:'後送官',dashboard:'戰情中心'};const labels={red:'紅票',yellow:'黃票',green:'綠票',black:'黑票'};const badge=c=>`<span class="badge ${c||'gray'}">${labels[c]||'未檢傷'}</span>`;function showApp(){lobby.classList.add('hidden');app.classList.remove('hidden')}function stats(){const p=state.patients;return `<div class="stats"><div class="stat"><b>${p.length}</b>總傷患</div><div class="stat"><b>${p.filter(x=>x.primaryResult).length}</b>一次檢傷</div><div class="stat"><b>${p.filter(x=>x.secondaryResult).length}</b>二次檢傷</div><div class="stat"><b>${p.filter(x=>x.transported).length}</b>已後送</div><div class="stat"><b>${state.resources.filter(r=>r.type==='ambulance'&&r.status==='到達現場').length}</b>可用救護車</div></div>`}function render(){if(!state)return;roomTitle.textContent=`房間 ${state.roomCode}｜${state.scenario.name}`;memberInfo.innerHTML=`角色：<b>${rn[myRole]}</b>　姓名：<b>${myName}</b>　在線：${state.members.length}人`;if(myRole==='instructor')return instructor();if(myRole==='commander')return commander();if(myRole==='primary')return triage('primary');if(myRole==='secondary')return triage('secondary');if(myRole==='transport')return transport();dashboard()}
function instructor(){roleView.innerHTML=`<div class="card">${stats()}</div><div class="grid"><div class="card c6"><h3>案情內容</h3><p>${state.scenario.brief}</p><p><b>地點：</b>${state.scenario.location}</p><p><b>現場危害：</b>${state.scenario.hazards}</p><div style="font-size:42px;font-weight:900">${state.roomCode}</div></div><div class="card c6"><h3>在線角色</h3>${state.members.map(m=>`<div>${m.name}｜${rn[m.role]}</div>`).join('')}</div><div class="card c12"><h3>指揮紀錄</h3><div class="log">${state.logs.map(x=>`<div>${x.time}｜${x.text}</div>`).join('')}</div></div></div>`}
function commander(){roleView.innerHTML=`<div class="card">${stats()}</div><div class="grid"><div class="card c5"><h3>建立指揮</h3><select id="safety"><option>安全</option><option>部分危險</option><option>禁止進入</option></select><textarea id="report" placeholder="METHANE／初報內容"></textarea><button onclick="establish()">建立指揮並儲存初報</button></div><div class="card c7"><h3>救護車支援</h3><input id="ambCount" type="number" min="1" max="20" value="3"><button onclick="dispatchAmb()">隨機派遣並立即到場</button><h3>消防車數量</h3><div class="grid"><div class="c4"><label>11攻擊車</label><input id="f11" type="number" min="0" value="0"></div><div class="c4"><label>16攻擊車</label><input id="f16" type="number" min="0" value="0"></div><div class="c4"><label>61水庫車</label><input id="f61" type="number" min="0" value="0"></div><div class="c4"><label>75救助器材車</label><input id="f75" type="number" min="0" value="0"></div><div class="c4"><label>213雲梯車</label><input id="f213" type="number" min="0" value="0"></div><div class="c4"><label>51化學車</label><input id="f51" type="number" min="0" value="0"></div></div><button onclick="dispatchFire()">派遣消防車並立即到場</button><div class="grid" style="margin-top:8px"><div class="c4"><button class="secondary" onclick="utility('台電')">台電</button></div><div class="c4"><button class="secondary" onclick="utility('欣桃瓦斯')">欣桃瓦斯</button></div><div class="c4"><button class="secondary" onclick="utility('外縣市支援')">外縣市支援</button></div></div></div><div class="card c6"><h3>現場資源</h3><div class="log">${state.resources.map(r=>`<div>${r.type==='ambulance'?'🚑':r.type==='fire'?'🚒':'🛠️'} <b>${r.name}</b>${r.vehicleType?'（'+r.vehicleType+'）':''}｜${r.status}${r.destination?' → '+r.destination:''}</div>`).join('')||'尚無資源'}</div></div><div class="card c6"><h3>指揮紀錄</h3><div class="log">${state.logs.map(x=>`<div>${x.time}｜${x.text}</div>`).join('')}</div></div></div>`}function establish(){socket.emit('establishCommand',{safety:safety.value,report:report.value})}function dispatchAmb(){socket.emit('dispatchAmbulances',{count:+ambCount.value||1},r=>{if(!r.ok)alert('派遣失敗')})}function dispatchFire(){socket.emit('dispatchFire',{fire11:+f11.value,fire16:+f16.value,fire61:+f61.value,fire75:+f75.value,fire213:+f213.value,fire51:+f51.value},r=>alert(r.ok?'消防車已到場':r.message))}function utility(name){socket.emit('addUtility',{name})}
function triage(mode){const list=state.patients.filter(p=>mode==='primary'?!p.primaryResult:(p.primaryResult&&!p.secondaryResult));roleView.innerHTML=`<div class="card">${stats()}</div><div class="grid"><div class="card c4"><h3>${mode==='primary'?'一次':'二次'}檢傷官</h3><div class="notice">${mode==='primary'?'依START流程完成初次檢傷':'重新評估並保留前後票色'}</div><div class="patients">${list.map(p=>`<div class="patient ${p.lockedBy?'locked':''}" onclick="${p.lockedBy?'':'startFlow(\''+mode+'\',\''+p.id+'\')'}"><b>${p.id}</b><br>${p.sex}｜${p.age}歲<br>${mode==='secondary'?badge(p.primaryResult):''}<br><small>${p.note}</small></div>`).join('')||'目前沒有待檢傷傷患'}</div></div><div class="card c8" id="flowArea"><h3>檢傷操作區</h3><p>請選擇傷患。</p></div></div>`}function startFlow(mode,id){socket.emit('lockPatient',{patientId:id},r=>{if(!r.ok)return alert(r.message);flow={mode,id,step:0};renderFlow()})}function renderFlow(){const p=state.patients.find(x=>x.id===flow.id),a=document.getElementById('flowArea');const head=`<h3>${p.id}｜${p.sex}｜${p.age}歲</h3><div class="grid"><div class="card c6"><b>傷情</b><br>${p.note}</div><div class="card c6"><b>受傷機轉</b><br>${p.mechanism}</div><div class="card c6"><b>目前徵象</b><br>${p.signs}</div><div class="card c6"><b>呼吸速率</b><br>${p.rr}</div></div>`;const ask=(q,opts)=>a.innerHTML=head+`<div class="question">${q}</div>`+opts.map(o=>`<button class="choice" onclick="${o.fn}">${o.t}</button>`).join('');if(flow.step===0)ask('可以自行行走嗎？',[{t:'可以',fn:"finishFlow('green')"},{t:'不可以',fn:'flow.step=1;renderFlow()'}]);else if(flow.step===1)ask('有呼吸嗎？',[{t:'有',fn:'flow.step=3;renderFlow()'},{t:'無',fn:'flow.step=2;renderFlow()'}]);else if(flow.step===2)ask('開放呼吸道後是否恢復呼吸？',[{t:'恢復',fn:"finishFlow('red')"},{t:'仍無呼吸',fn:"finishFlow('black')"}]);else if(flow.step===3)ask(`呼吸速率 ${p.rr}，是否大於30？`,[{t:'是',fn:"finishFlow('red')"},{t:'否',fn:'flow.step=4;renderFlow()'}]);else if(flow.step===4)ask('橈動脈是否摸得到？',[{t:'摸得到',fn:'flow.step=5;renderFlow()'},{t:'摸不到',fn:"finishFlow('red')"}]);else ask('可以遵從簡單命令嗎？',[{t:'可以',fn:"finishFlow('yellow')"},{t:'不可以',fn:"finishFlow('red')"}])}function finishFlow(result){const event=flow.mode==='primary'?'submitPrimary':'submitSecondary';socket.emit(event,{patientId:flow.id,result},r=>{if(!r.ok)alert(r.message);flow=null})}
function transport(){const waiting=state.patients.filter(p=>(p.secondaryResult||p.primaryResult)&&!p.transported&&(p.secondaryResult||p.primaryResult)!=='black'),ambs=state.resources.filter(r=>r.type==='ambulance'&&r.status==='到達現場');roleView.innerHTML=`<div class="card">${stats()}</div><div class="grid"><div class="card c4"><h3>待後送傷患</h3><div class="notice">每車最多3人；紅黃不可同車；紅或黃每車最多1人。</div><div class="patients">${waiting.map(p=>`<div class="patient ${transportChoice.patientIds.includes(p.id)?'selected':''}" onclick="togglePatient('${p.id}')"><b>${p.id}</b><br>${badge(p.secondaryResult||p.primaryResult)}</div>`).join('')||'無待後送傷患'}</div></div><div class="card c4"><h3>可用救護車</h3>${ambs.length?`<div class="patients">${ambs.map(a=>`<div class="patient ${transportChoice.ambulance===a.name?'selected':''}" onclick="transportChoice.ambulance='${a.name}';transport()"><b>🚑 ${a.name}</b><br>到達現場</div>`).join('')}</div>`:`<div class="notice">現場無可用救護車</div><button onclick="socket.emit('requestMoreAmbulances');alert('已通知指揮官')">通知指揮官加派</button>`}</div><div class="card c4"><h3>醫院收治患者量能</h3>${state.hospitals.map(h=>`<div class="patient ${transportChoice.hospital===h.name?'selected':''}" onclick="transportChoice.hospital='${h.name}';transport()"><b>🏥 ${h.name}</b><br>紅${h.capacity.red}／黃${h.capacity.yellow}／綠${h.capacity.green}</div>`).join('')}</div><div class="card c12"><h3>目前後送編組</h3><div class="notice">傷患：${transportChoice.patientIds.join('、')||'未選擇'}<br>救護車：${transportChoice.ambulance||'未選擇'}<br>醫院：${transportChoice.hospital||'未選擇'}</div><button onclick="confirmTx()">確認整車後送</button></div><div class="card c12"><h3>後送紀錄</h3><div class="log">${state.transportLogs.map(t=>`<div>${t.time}｜${t.patientIds.join('、')}｜${t.ambulance} → ${t.hospital}｜${t.status}</div>`).join('')||'尚無紀錄'}</div></div></div>`}function togglePatient(id){const ids=transportChoice.patientIds;if(ids.includes(id)){transportChoice.patientIds=ids.filter(x=>x!==id);return transport()}const trial=[...ids,id],colors=trial.map(x=>{const p=state.patients.find(y=>y.id===x);return p.secondaryResult||p.primaryResult});const red=colors.filter(c=>c==='red').length,yellow=colors.filter(c=>c==='yellow').length;if(trial.length>3)return alert('最多3人');if(red>1)return alert('紅票最多1人');if(yellow>1)return alert('黃票最多1人');if(red&&yellow)return alert('紅黃不可同車');transportChoice.patientIds=trial;transport()}function confirmTx(){if(!transportChoice.patientIds.length||!transportChoice.ambulance||!transportChoice.hospital)return alert('請完整選擇');socket.emit('transport',transportChoice,r=>{alert(r.ok?'後送完成':r.message);if(r.ok)transportChoice={patientIds:[],ambulance:null,hospital:null}})}
function dashboard(){const c={red:0,yellow:0,green:0,black:0};state.patients.forEach(p=>{const x=p.secondaryResult||p.primaryResult;if(x)c[x]++});roleView.innerHTML=`<div class="card">${stats()}</div><div class="grid"><div class="card c6"><h3>目前票色</h3><div class="stats"><div class="stat">${badge('red')}<b>${c.red}</b></div><div class="stat">${badge('yellow')}<b>${c.yellow}</b></div><div class="stat">${badge('green')}<b>${c.green}</b></div><div class="stat">${badge('black')}<b>${c.black}</b></div></div></div><div class="card c6"><h3>最新紀錄</h3><div class="log">${state.logs.map(x=>`<div>${x.time}｜${x.text}</div>`).join('')}</div></div></div>`}
createBtn.onclick=()=>{myName=teacherName.value||'教官';myRole='instructor';socket.emit('createRoom',{name:myName,scenarioName:scenarioName.value,scenarioType:scenarioType.value,patientCount:patientCount.value},r=>{if(!r.ok)return alert('建立失敗');state=r.state;showApp();render()})};joinBtn.onclick=()=>{myName=joinName.value||'未具名';myRole=role.value;socket.emit('joinRoom',{roomCode:roomCode.value,name:myName,role:myRole},r=>{if(!r.ok)return alert(r.message);state=r.state;showApp();render()})};leaveBtn.onclick=()=>location.reload();socket.on('state',s=>{state=s;render()});socket.on('alert',a=>{if(a.targetRole===myRole)alert(a.message)});
</script></body></html>
